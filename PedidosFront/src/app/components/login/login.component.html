<div class="auth-wrap">
    <div class="noise"></div>

    <aside class="auth-brand">
        <div class="brand-inner">
            <div class="brand-mark">
                <span class="brand-icon">◈</span>
            </div>
            <h1 class="brand-title">Pedidos<em>App</em></h1>
            <p class="brand-tagline">Gestión de pedidos<br>sin fricción.</p>
            <div class="brand-deco">
                <div class="deco-line"></div>
                <span class="deco-num">01 / 03</span>
            </div>
        </div>
        <div class="brand-bg-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
    </aside>

    <main class="auth-form-side">
        <div class="auth-form-container">

            <header class="form-header">
                <span class="form-eyebrow">Bienvenido de vuelta</span>
                <h2 class="form-title">Iniciá sesión</h2>
            </header>

            <form class="auth-form" (ngSubmit)="onSubmit()" #f="ngForm">

                <div class="field-group">
                    <label class="field-label" for="email">Correo electrónico</label>
                    <div class="field-wrap">
                        <span class="field-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.5">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                                <polyline points="22,6 12,13 2,6" />
                            </svg>
                        </span>
                        <input id="email" class="field-input" type="email" placeholder="nombre@ejemplo.com"
                            [(ngModel)]="email" name="email" autocomplete="email" />
                    </div>
                </div>

                <div class="field-group">
                    <label class="field-label" for="password">Contraseña</label>
                    <div class="field-wrap">
                        <span class="field-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.5">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                            </svg>
                        </span>
                        <input id="password" class="field-input" [type]="showPassword() ? 'text' : 'password'"
                            placeholder="••••••••" [(ngModel)]="password" name="password"
                            autocomplete="current-password" />
                        <button type="button" class="toggle-pwd" (click)="togglePassword()">
                            <svg *ngIf="!showPassword()" width="16" height="16" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="1.5">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                            <svg *ngIf="showPassword()" width="16" height="16" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="1.5">
                                <path
                                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                                <line x1="1" y1="1" x2="23" y2="23" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-error" *ngIf="error()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="12" />
                        <line x1="12" y1="16" x2="12.01" y2="16" />
                    </svg>
                    {{ error() }}
                </div>

                <button type="submit" class="btn-primary" [class.loading]="loading()">
                    <span *ngIf="!loading()">Ingresar</span>
                    <span *ngIf="loading()" class="spinner-wrap">
                        <span class="spinner"></span>
                        Verificando...
                    </span>
                </button>

            </form>

            <footer class="form-footer">
                <span class="footer-text">¿No tenés cuenta?</span>
                <a [routerLink]="['/register']" class="footer-link">Registrate acá →</a>
            </footer>

        </div>
    </main>
</div>
